name: release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.rp.outputs.releases_created }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: pnpm
      - run: npm install -g npm@latest # OIDC trusted publishing needs npm >= 11.5
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter "./packages/*" --filter "./reflexes/*" build
      # pnpm pack resolves workspace:* deps to real versions; `npm publish` does the
      # OIDC trusted-publishing exchange (no token — `id-token: write` is set above).
      - run: |
          mkdir -p "$RUNNER_TEMP/tarballs"
          for dir in packages/core packages/adapters packages/cli; do
            (cd "$dir" && pnpm pack --pack-destination "$RUNNER_TEMP/tarballs")
          done
          for tgz in "$RUNNER_TEMP"/tarballs/*.tgz; do
            npm publish "$tgz" --access public --provenance
          done
