name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm biome ci .
        if: runner.os == 'Linux' # formatting is OS-independent; lint once
      - run: pnpm -r --filter "./packages/*" --filter "./reflexes/*" build
      - run: pnpm -r run --if-present typecheck
      - run: pnpm test
      - run: node scripts/smoke-hook.mjs # the dispatcher must work on every OS
