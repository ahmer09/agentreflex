# Cloudflare Pages config for the marketing site (agentreflex.dev).
# With pages_build_output_dir set, `wrangler pages deploy` needs no flags:
#   pnpm --filter @agentreflex/www run deploy   (builds, then deploys ./out)
name = "agentreflex-www"
pages_build_output_dir = "out"
compatibility_date = "2026-06-26"
